name: 'bookshop'
version: '1.0.0'
config-version: 2

profile: 'bookshop'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  bookshop:
    staging:
      +schema: STAGING
      +materialized: view
    warehouse:
      +schema: WAREHOUSE
      +materialized: table
    marts:
      +schema: MARTS
      +materialized: table